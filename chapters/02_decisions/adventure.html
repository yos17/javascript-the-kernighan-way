<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Forest of Fates</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0a12;
      color: #d4c9a8;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background-color 1.2s ease;
    }

    body.theme-river   { background-color: #060d14; }
    body.theme-mountain { background-color: #0d0a06; }
    body.theme-good    { background-color: #060f06; }
    body.theme-bad     { background-color: #120606; }

    #game {
      max-width: 680px;
      width: 100%;
    }

    /* ---- Header ---- */
    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: clamp(1.4rem, 5vw, 2.1rem);
      color: #c9a84c;
      text-shadow: 0 0 18px rgba(201,168,76,0.5), 0 0 40px rgba(201,168,76,0.18);
      letter-spacing: 0.06em;
    }

    header p {
      font-size: 0.8rem;
      color: #5a5244;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ---- Scene card ---- */
    #scene-card {
      background: linear-gradient(160deg, #16141f 0%, #0f0e17 100%);
      border: 1px solid #2e2a3a;
      border-radius: 4px;
      padding: 36px 40px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.04);
      position: relative;
      animation: fadeUp 0.4s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #scene-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 4px;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ---- Ending banner ---- */
    #ending-banner {
      display: none;
      text-align: center;
      padding-bottom: 28px;
    }

    #ending-banner.visible { display: block; }

    #ending-title {
      font-size: clamp(1.1rem, 4vw, 1.7rem);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    #ending-title.good {
      color: #8ecf6e;
      text-shadow: 0 0 22px rgba(142,207,110,0.4);
    }

    #ending-title.bad {
      color: #cf6e6e;
      text-shadow: 0 0 22px rgba(207,110,110,0.4);
    }

    #choice-tally {
      font-size: 0.85rem;
      color: #6b6250;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
    }

    /* ---- Scene text ---- */
    #scene-text {
      font-size: 1.05rem;
      line-height: 1.85;
      color: #cfc5a5;
      min-height: 100px;
      margin-bottom: 30px;
    }

    /* ---- Choice buttons ---- */
    #choices { display: flex; flex-direction: column; gap: 12px; }

    .choice-btn {
      background: linear-gradient(135deg, #1e1b2e 0%, #17151f 100%);
      border: 1px solid #3a3555;
      color: #b8ad8a;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.95rem;
      padding: 14px 20px;
      border-radius: 3px;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .choice-btn::before {
      content: '\203A\00A0\00A0';
      color: #7a6e52;
      transition: color 0.2s;
    }

    .choice-btn:hover {
      background: linear-gradient(135deg, #2a263f 0%, #201d2e 100%);
      border-color: #c9a84c;
      color: #e8ddb8;
      transform: translateX(4px);
      box-shadow: -3px 0 0 #c9a84c;
    }

    .choice-btn:hover::before { color: #c9a84c; }

    /* ---- Play Again button ---- */
    #play-again-btn {
      background: transparent;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    #play-again-btn:hover {
      background: #c9a84c;
      color: #0a0a12;
      box-shadow: 0 0 24px rgba(201,168,76,0.35);
    }

    /* ---- Footer ---- */
    footer {
      text-align: center;
      margin-top: 22px;
      font-size: 0.76rem;
      color: #2e2c28;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div id="game">
    <header>
      <h1>The Forest of Fates</h1>
      <p>A Choose Your Adventure Story</p>
    </header>

    <div id="scene-card">
      <div id="ending-banner">
        <div id="ending-title"></div>
        <p id="choice-tally"></p>
        <button id="play-again-btn">Play Again</button>
      </div>
      <p id="scene-text"></p>
      <div id="choices"></div>
    </div>

    <footer>Chapter 2 &mdash; Decisions &mdash; JavaScript: The Kernighan Way</footer>
  </div>

  <script>
    // ── Scene data ────────────────────────────────────────────────────────────
    // Each scene has: text, choices (array of {text, next}).
    // Endings also have: ending: { type: 'good'|'bad', title: string }
    const scenes = {
      start: {
        text: `You open your eyes. Cold morning air stings your cheeks. You are lying
               on damp moss in a forest you don't recognise. Twisted oak trees tower
               overhead, their branches hiding most of the grey sky. Two narrow paths
               cut through the undergrowth ahead of you.`,
        choices: [
          { text: 'Follow the left path toward the sound of rushing water', next: 'river_bank' },
          { text: 'Take the right path winding up toward dark mountains',   next: 'mountain_base' },
        ],
      },

      river_bank: {
        text: `The path opens onto a wide, fast-moving river. A rickety rope bridge
               sways over the churning water. On the far bank you can make out the
               warm glow of village lanterns. But a small wooden boat sits half-hidden
               in the reeds — old, but it looks sturdy enough to hold you.`,
        choices: [
          { text: 'Cross the rope bridge to the village', next: 'bridge_crossing' },
          { text: 'Take the boat and drift downstream',   next: 'boat_downstream' },
        ],
      },

      bridge_crossing: {
        text: `Halfway across, a plank snaps under your foot. You grab the rope rail
               just in time and hang over the white water far below. Heart hammering,
               you realise you are already more than halfway across. Push forward — or
               scramble back?`,
        choices: [
          { text: 'Push forward and reach the far bank', next: 'village_arrival' },
          { text: 'Scramble back to the riverbank',      next: 'river_bank' },
        ],
      },

      boat_downstream: {
        text: `The little boat carries you swiftly along the river. Around a wide bend
               the current speeds up alarmingly. Ahead the river forks. The left
               channel disappears into a dark cave with strange light flickering inside.
               The right channel sparkles in sudden sunlight and you can hear birds.`,
        choices: [
          { text: 'Steer into the dark cave on the left',  next: 'cave_treasure' },
          { text: 'Follow the bright right channel south', next: 'village_arrival' },
        ],
      },

      mountain_base: {
        text: `The rocky trail climbs sharply. You pass the ruin of an old watchtower.
               At its base, a rusted iron door stands slightly ajar. A painted sign
               reads: DANGER — WOLVES. Further up the trail, a crow hops toward you
               on the path, as if it wants to lead you higher.`,
        choices: [
          { text: 'Pull open the iron door and explore the tower', next: 'tower_inside' },
          { text: 'Follow the crow up the mountain trail',         next: 'mountain_peak' },
        ],
      },

      tower_inside: {
        text: `Inside the tower is dim but dry. Shelves of dusty jars line the walls.
               You find a leather satchel, a flint and steel, and a rolled-up map
               showing a secret valley on the far side of the mountain. Then you hear
               it — a low growl from the shadows in the corner.`,
        choices: [
          { text: 'Grab the satchel and bolt through the door', next: 'escape_satchel' },
          { text: 'Strike the flint, make light, and stand your ground', next: 'wolf_standoff' },
        ],
      },

      wolf_standoff: {
        text: `The flame catches. In the flickering orange light you see a wolf — but
               she is protecting two pups, not hunting you. You back away slowly, hands
               raised. She watches but does not follow. Outside, you realise you left
               the satchel and map behind. You are safe, but empty-handed.`,
        choices: [
          { text: 'Continue up the mountain trail without the map', next: 'mountain_peak' },
        ],
      },

      // ── Endings ──────────────────────────────────────────────────────────────

      village_arrival: {
        text: `You reach the village. Friendly faces meet you at the gate. A farmer
               gives you hot soup and explains you are only a day's walk from home.
               You spend the night by a warm fire listening to songs you have never
               heard before. Walking home the next afternoon, you decide that getting
               lost was the best thing that ever happened to you.`,
        ending: { type: 'good', title: 'A Warm Welcome' },
        choices: [],
      },

      cave_treasure: {
        text: `The cave is deep and your eyes adjust slowly. Glittering crystals cover
               the walls — it is a geode cavern the size of a cathedral. At the centre,
               on a flat rock, sits a small chest. Inside: a compass, a pouch of gold
               coins, and a note that reads "For the brave traveller who found the way."
               You follow the compass home and arrive at sunset, richer in every sense.`,
        ending: { type: 'good', title: 'The Hidden Treasure' },
        choices: [],
      },

      escape_satchel: {
        text: `You sprint out of the tower with the satchel and slam the door behind
               you. The growling fades. Inside the satchel you find flint and steel,
               dried fruit, and the map. You follow the hidden pass over the mountain
               and discover a peaceful valley where a small community welcomes you as
               the long-awaited map-bearer from an old legend. You have found a second home.`,
        ending: { type: 'good', title: 'The Map-Bearer' },
        choices: [],
      },

      mountain_peak: {
        text: `The trail grows steeper and the air colder. Near the summit a heavy fog
               rolls in — you cannot see more than three feet in any direction. Hours
               pass. You walk in circles. As night falls the temperature drops below
               freezing. You huddle against a boulder and wait for a dawn that feels
               a very long time away.`,
        ending: { type: 'bad', title: 'Lost in the Fog' },
        choices: [],
      },
    };

    // ── State ─────────────────────────────────────────────────────────────────
    let currentScene = 'start';
    let choiceCount = 0;

    // ── DOM references ────────────────────────────────────────────────────────
    const sceneTextEl   = document.getElementById('scene-text');
    const choicesEl     = document.getElementById('choices');
    const endingBanner  = document.getElementById('ending-banner');
    const endingTitleEl = document.getElementById('ending-title');
    const choiceTallyEl = document.getElementById('choice-tally');
    const playAgainBtn  = document.getElementById('play-again-btn');

    // ── Set body theme using a switch statement ───────────────────────────────
    function applyTheme(sceneId) {
      document.body.className = '';

      // switch lets us check one value against many possible cases.
      // Here we use switch(true) so each case can be a full condition.
      switch (true) {
        case sceneId === 'river_bank' || sceneId === 'bridge_crossing' || sceneId === 'boat_downstream':
          document.body.classList.add('theme-river');
          break;
        case sceneId === 'mountain_base' || sceneId === 'tower_inside' ||
             sceneId === 'wolf_standoff' || sceneId === 'mountain_peak':
          document.body.classList.add('theme-mountain');
          break;
        case scenes[sceneId]?.ending?.type === 'good':
          document.body.classList.add('theme-good');
          break;
        case scenes[sceneId]?.ending?.type === 'bad':
          document.body.classList.add('theme-bad');
          break;
        default:
          break;
      }
    }

    // ── Main scene renderer ───────────────────────────────────────────────────
    function showScene(sceneId) {
      const scene = scenes[sceneId];

      // Guard: unknown scene id — go back to start
      if (scene === undefined) {
        showScene('start');
        return;
      }

      applyTheme(sceneId);

      // Collapse the extra whitespace introduced by template-literal indentation
      sceneTextEl.textContent = scene.text.replace(/\s+/g, ' ').trim();

      // if/else: endings get a special screen, regular scenes get buttons
      if (scene.ending !== undefined) {
        showEnding(scene.ending);
      } else {
        endingBanner.classList.remove('visible');
        renderChoices(scene.choices);
      }

      // Re-trigger the CSS animation on the card
      const card = document.getElementById('scene-card');
      card.style.animation = 'none';
      card.offsetHeight; // force reflow
      card.style.animation = '';
    }

    // ── Build choice buttons ──────────────────────────────────────────────────
    function renderChoices(choices) {
      choicesEl.innerHTML = '';

      choices.forEach((choice) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.text;

        btn.addEventListener('click', () => {
          choiceCount += 1;
          currentScene = choice.next;
          showScene(currentScene);
        });

        choicesEl.appendChild(btn);
      });
    }

    // ── Show ending screen ────────────────────────────────────────────────────
    function showEnding(ending) {
      choicesEl.innerHTML = '';
      endingBanner.classList.add('visible');

      endingTitleEl.textContent = ending.title;

      // Ternary operator: a compact if/else — condition ? ifTrue : ifFalse
      endingTitleEl.className = ending.type === 'good' ? 'good' : 'bad';

      // Logical operators && and || decide the bonus message
      const quick   = choiceCount <= 3 && ending.type === 'good';
      const thorough = choiceCount >= 5;
      const bonus = quick ? ' You found it quickly!' : thorough ? ' You took the long road.' : '';

      // !== checks "not equal" — here used to pick singular vs plural
      const noun = choiceCount !== 1 ? 'choices' : 'choice';
      choiceTallyEl.textContent = `You made ${choiceCount} ${noun}.${bonus}`;
    }

    // ── Play Again ────────────────────────────────────────────────────────────
    playAgainBtn.addEventListener('click', () => {
      choiceCount = 0;
      currentScene = 'start';
      showScene('start');
    });

    // ── Start the game ────────────────────────────────────────────────────────
    showScene('start');
  </script>
</body>
</html>

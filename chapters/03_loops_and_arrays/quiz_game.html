<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Trivia Quiz Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            display: none;
        }

        .container.active {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2em;
        }

        h2 {
            color: #764ba2;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .start-screen {
            text-align: center;
        }

        .start-screen p {
            color: #555;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .quiz-screen {
            display: none;
        }

        .quiz-screen.active {
            display: block;
        }

        .progress {
            margin-bottom: 30px;
        }

        .progress-bar {
            background: #eee;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.9em;
            color: #666;
        }

        .score-display {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .score-item {
            font-weight: bold;
            color: #667eea;
        }

        .timer {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .timer.warning {
            color: #ff6b6b;
        }

        .timer-bar {
            background: #eee;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            background: linear-gradient(90deg, #51cf66 0%, #ff6b6b 100%);
            height: 100%;
            transition: width 0.1s linear;
        }

        .question {
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option {
            background: #f5f5f5;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            text-align: left;
        }

        .option:hover:not(.disabled) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #e8ecff;
        }

        .option.correct {
            background: #d4edda;
            border-color: #51cf66;
            color: #155724;
            font-weight: bold;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #ff6b6b;
            color: #721c24;
            font-weight: bold;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 15px;
            font-size: 1em;
            font-weight: bold;
            text-align: center;
            min-height: 30px;
        }

        .feedback.correct {
            color: #51cf66;
        }

        .feedback.incorrect {
            color: #ff6b6b;
        }

        .results-screen {
            text-align: center;
        }

        .final-score {
            font-size: 3em;
            color: #667eea;
            margin: 30px 0;
            font-weight: bold;
        }

        .percentage {
            font-size: 1.5em;
            color: #764ba2;
            margin-bottom: 20px;
        }

        .message {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .retry-button {
            background: linear-gradient(135deg, #51cf66 0%, #40c057 100%);
            margin-top: 20px;
        }

        .retry-button:hover {
            box-shadow: 0 10px 20px rgba(81, 207, 102, 0.4);
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <!-- Start Screen -->
        <div class="screen active" id="startScreen">
            <h1>🧠 Trivia Quiz Game</h1>
            <p>Think you're a trivia master? Test your knowledge with 10 fun questions!</p>
            <p>You have <strong>15 seconds</strong> per question. Ready?</p>
            <button onclick="startQuiz()">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div class="screen" id="quizScreen">
            <div class="progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Question 1 of 10</div>
            </div>

            <div class="score-display">
                <div class="score-item">✓ Correct: <span id="correctCount">0</span></div>
                <div class="score-item">✗ Wrong: <span id="wrongCount">0</span></div>
            </div>

            <div class="timer" id="timer">15</div>
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="question">
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="feedback" id="feedback"></div>
            </div>
        </div>

        <!-- Results Screen -->
        <div class="screen" id="resultsScreen">
            <h1>🎉 Quiz Complete!</h1>
            <div class="final-score" id="finalScore">0/10</div>
            <div class="percentage" id="percentageText">0%</div>
            <div class="message" id="resultMessage"></div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Total Time</div>
                    <div class="stat-value" id="totalTime">0s</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Avg Per Question</div>
                    <div class="stat-value" id="avgTime">0s</div>
                </div>
            </div>
            <button onclick="startQuiz()">Try Again</button>
        </div>
    </div>

    <script>
        // Questions array with destructuring-friendly structure
        const questions = [
            {
                question: "What is the capital of Japan?",
                options: ["Tokyo", "Osaka", "Kyoto", "Hiroshima"],
                correct: 0
            },
            {
                question: "How many continents are there?",
                options: ["5", "6", "7", "8"],
                correct: 2
            },
            {
                question: "Which planet is closest to the Sun?",
                options: ["Venus", "Mercury", "Earth", "Mars"],
                correct: 1
            },
            {
                question: "What is the largest mammal in the world?",
                options: ["African Elephant", "Blue Whale", "Giraffe", "Hippopotamus"],
                correct: 1
            },
            {
                question: "In what year did the Titanic sink?",
                options: ["1912", "1915", "1920", "1905"],
                correct: 0
            },
            {
                question: "What is the smallest country in the world by area?",
                options: ["Monaco", "Liechtenstein", "Vatican City", "San Marino"],
                correct: 2
            },
            {
                question: "Which superhero is also known as Clark Kent?",
                options: ["Batman", "Superman", "Spider-Man", "Iron Man"],
                correct: 1
            },
            {
                question: "How many sides does a hexagon have?",
                options: ["4", "5", "6", "8"],
                correct: 2
            },
            {
                question: "What is the freezing point of water in Celsius?",
                options: ["0°C", "32°C", "-40°C", "100°C"],
                correct: 0
            },
            {
                question: "Which country is home to the Eiffel Tower?",
                options: ["Germany", "Italy", "France", "Spain"],
                correct: 2
            }
        ];

        // Game state
        let state = {
            currentQuestion: 0,
            correct: 0,
            wrong: 0,
            shuffledQuestions: [],
            timeStarted: 0,
            questionStartTime: 0,
            answered: false
        };

        // Fisher-Yates shuffle algorithm
        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startQuiz() {
            state = {
                currentQuestion: 0,
                correct: 0,
                wrong: 0,
                shuffledQuestions: shuffleArray(questions),
                timeStarted: Date.now(),
                questionStartTime: Date.now(),
                answered: false
            };

            showScreen('quizScreen');
            displayQuestion();
            startTimer();
        }

        function displayQuestion() {
            const { question, options } = state.shuffledQuestions[state.currentQuestion];

            document.getElementById('questionText').textContent = question;
            document.getElementById('progressText').textContent =
                `Question ${state.currentQuestion + 1} of ${questions.length}`;

            const progressPercent = ((state.currentQuestion) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progressPercent + '%';

            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';

            // Use .map() to create option elements
            const optionsHtml = options.map((option, index) =>
                `<button class="option" onclick="selectAnswer(${index})">${option}</button>`
            ).join('');

            document.getElementById('optionsContainer').innerHTML = optionsHtml;
            state.answered = false;
        }

        function selectAnswer(selectedIndex) {
            if (state.answered) return;

            state.answered = true;
            clearInterval(state.timerInterval);

            const { correct: correctIndex, options } = state.shuffledQuestions[state.currentQuestion];
            const optionButtons = document.querySelectorAll('.option');

            // Disable all options
            optionButtons.forEach(btn => btn.classList.add('disabled'));

            if (selectedIndex === correctIndex) {
                state.correct++;
                optionButtons[selectedIndex].classList.add('correct');
                document.getElementById('feedback').textContent = '✓ Correct!';
                document.getElementById('feedback').classList.add('correct');
            } else {
                state.wrong++;
                optionButtons[selectedIndex].classList.add('incorrect');
                optionButtons[correctIndex].classList.add('correct');
                document.getElementById('feedback').textContent = `✗ Wrong! The answer is "${options[correctIndex]}"`;
                document.getElementById('feedback').classList.add('incorrect');
            }

            // Update score display
            document.getElementById('correctCount').textContent = state.correct;
            document.getElementById('wrongCount').textContent = state.wrong;

            // Auto-advance after 1.5 seconds
            setTimeout(nextQuestion, 1500);
        }

        function nextQuestion() {
            state.currentQuestion++;
            if (state.currentQuestion < questions.length) {
                state.questionStartTime = Date.now();
                displayQuestion();
                startTimer();
            } else {
                showResults();
            }
        }

        function startTimer() {
            let timeLeft = 15;
            const timerDisplay = document.getElementById('timer');
            const timerFill = document.getElementById('timerFill');

            timerDisplay.textContent = timeLeft;
            timerDisplay.classList.remove('warning');
            timerFill.style.width = '100%';

            state.timerInterval = setInterval(() => {
                timeLeft--;
                const percent = (timeLeft / 15) * 100;

                timerDisplay.textContent = timeLeft;
                timerFill.style.width = percent + '%';

                if (timeLeft <= 5) {
                    timerDisplay.classList.add('warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(state.timerInterval);
                    selectAnswer(-1);
                }
            }, 1000);
        }

        function showResults() {
            const percentage = Math.round((state.correct / questions.length) * 100);
            const totalTime = Math.round((Date.now() - state.timeStarted) / 1000);
            const avgTime = Math.round(totalTime / questions.length);

            document.getElementById('finalScore').textContent = `${state.correct}/${questions.length}`;
            document.getElementById('percentageText').textContent = `${percentage}%`;
            document.getElementById('totalTime').textContent = `${totalTime}s`;
            document.getElementById('avgTime').textContent = `${avgTime}s`;

            // Personalized message based on score
            let message = '';
            if (percentage === 100) {
                message = '🏆 Perfect score! You\'re a trivia champion!';
            } else if (percentage >= 80) {
                message = '⭐ Excellent work! You really know your stuff!';
            } else if (percentage >= 60) {
                message = '👍 Good job! You got most of them right!';
            } else if (percentage >= 40) {
                message = '💪 Not bad! Keep learning and try again!';
            } else {
                message = '📚 Keep practicing! Every question teaches you something new!';
            }

            document.getElementById('resultMessage').textContent = message;
            showScreen('resultsScreen');
        }

        function showScreen(screenId) {
            // Hide all screens
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });

            // Show target screen
            document.getElementById(screenId).classList.add('active');
        }

        // Shuffle questions on page load using .filter() and .forEach() for practice
        document.addEventListener('DOMContentLoaded', () => {
            // Use .filter() to verify we have questions (optional practice)
            const validQuestions = questions.filter(q => q.question && q.options.length === 4);

            // Use .forEach() to log question count (optional practice)
            let count = 0;
            validQuestions.forEach(() => count++);

            console.log(`Quiz loaded with ${count} questions`);
        });
    </script>
</body>
</html>

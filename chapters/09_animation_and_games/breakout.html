<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        #gameContainer {
            position: relative;
            display: inline-block;
        }

        canvas {
            border: 3px solid #fff;
            background: linear-gradient(180deg, #001a4d 0%, #000d26 100%);
            display: block;
            cursor: none;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        #controls {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 14px;
        }

        .key {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="controls">
            <p>Use <span class="key">← →</span> arrows or move your mouse to control the paddle</p>
            <p>Press <span class="key">SPACE</span> to start or <span class="key">P</span> to pause</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const PADDLE_WIDTH = 100;
        const PADDLE_HEIGHT = 15;
        const BALL_RADIUS = 7;
        const BRICK_WIDTH = 75;
        const BRICK_HEIGHT = 15;
        const BRICK_PADDING = 5;
        const BRICK_OFFSET_TOP = 60;
        const BRICK_OFFSET_LEFT = 30;

        // Game state
        let gameState = 'start'; // start, playing, paused, gameOver, levelComplete
        let score = 0;
        let lives = 3;
        let level = 1;
        let ballSpeed = 4;

        // Particle system
        let particles = [];

        // Paddle
        const paddle = {
            x: canvas.width / 2 - PADDLE_WIDTH / 2,
            y: canvas.height - 30,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            speed: 7,
            dx: 0
        };

        // Ball
        let ball = {
            x: paddle.x + paddle.width / 2,
            y: paddle.y - 20,
            radius: BALL_RADIUS,
            dx: ballSpeed * 0.7,
            dy: -ballSpeed * 1.0,
            isAttached: true
        };

        // Bricks
        let bricks = [];
        const brickColors = [
            '#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181'
        ];

        // Input handling
        const keys = {};
        let mouseX = canvas.width / 2;

        // Initialize bricks
        const initBricks = () => {
            bricks = [];
            const bricksPerRow = Math.floor((canvas.width - BRICK_OFFSET_LEFT * 2) / (BRICK_WIDTH + BRICK_PADDING));
            const rows = 5 + Math.floor(level / 2);

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < bricksPerRow; col++) {
                    const x = BRICK_OFFSET_LEFT + col * (BRICK_WIDTH + BRICK_PADDING);
                    const y = BRICK_OFFSET_TOP + row * (BRICK_HEIGHT + BRICK_PADDING);
                    const color = brickColors[row % brickColors.length];

                    bricks.push({
                        x, y,
                        width: BRICK_WIDTH,
                        height: BRICK_HEIGHT,
                        color,
                        active: true
                    });
                }
            }
        };

        // Initialize game
        const init = () => {
            initBricks();
            paddle.x = canvas.width / 2 - PADDLE_WIDTH / 2;
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - 20;
            ball.isAttached = true;
            ball.dx = ballSpeed * 0.7;
            ball.dy = -ballSpeed * 1.0;
            particles = [];
        };

        // Event listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;

            if (e.key === ' ') {
                e.preventDefault();
                if (gameState === 'start' || gameState === 'levelComplete') {
                    gameState = 'playing';
                    if (ball.isAttached) {
                        ball.isAttached = false;
                    }
                }
            }

            if (e.key.toLowerCase() === 'p') {
                if (gameState === 'playing') {
                    gameState = 'paused';
                } else if (gameState === 'paused') {
                    gameState = 'playing';
                }
            }

            if (e.key === 'r' && gameState === 'gameOver') {
                lives = 3;
                score = 0;
                level = 1;
                ballSpeed = 4;
                init();
                gameState = 'start';
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
        });

        // Update game
        const update = () => {
            if (gameState !== 'playing') return;

            // Paddle movement
            if (keys['arrowleft'] && paddle.x > 0) {
                paddle.x -= paddle.speed;
            }
            if (keys['arrowright'] && paddle.x + paddle.width < canvas.width) {
                paddle.x += paddle.speed;
            }

            // Mouse control
            const paddleTarget = Math.max(0, Math.min(mouseX - paddle.width / 2, canvas.width - paddle.width));
            paddle.x += (paddleTarget - paddle.x) * 0.15;

            // Ball movement
            if (!ball.isAttached) {
                ball.x += ball.dx;
                ball.y += ball.dy;

                // Wall collisions
                if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                    ball.dx *= -1;
                    ball.x = Math.max(ball.radius, Math.min(canvas.width - ball.radius, ball.x));
                }

                if (ball.y - ball.radius < 0) {
                    ball.dy *= -1;
                    ball.y = ball.radius;
                }

                // Paddle collision
                if (aabbCollision(ball, paddle)) {
                    ball.dy = -Math.abs(ball.dy);
                    const hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
                    ball.dx = hitPos * ballSpeed * 1.2;
                    ball.y = paddle.y - ball.radius;
                }

                // Brick collisions
                for (const brick of bricks) {
                    if (!brick.active) continue;

                    if (aabbCollision(ball, brick)) {
                        brick.active = false;
                        score += 10;
                        ballSpeed += 0.1;

                        // Particle effect
                        createParticles(brick.x + brick.width / 2, brick.y + brick.height / 2, brick.color);

                        // Determine collision side
                        const overlapLeft = ball.x + ball.radius - brick.x;
                        const overlapRight = brick.x + brick.width - (ball.x - ball.radius);
                        const overlapTop = ball.y + ball.radius - brick.y;
                        const overlapBottom = brick.y + brick.height - (ball.y - ball.radius);

                        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

                        if (minOverlap === overlapLeft || minOverlap === overlapRight) {
                            ball.dx *= -1;
                        } else {
                            ball.dy *= -1;
                        }

                        break;
                    }
                }

                // Ball lost
                if (ball.y > canvas.height) {
                    lives--;
                    if (lives <= 0) {
                        gameState = 'gameOver';
                    } else {
                        ball.x = paddle.x + paddle.width / 2;
                        ball.y = paddle.y - 20;
                        ball.isAttached = true;
                        ball.dx = ballSpeed * 0.7;
                        ball.dy = -ballSpeed * 1.0;
                    }
                }
            } else {
                // Ball attached to paddle
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - 20;
            }

            // Check level completion
            if (bricks.every(b => !b.active)) {
                level++;
                ballSpeed = 4 + (level - 1) * 0.5;
                score += 100; // Bonus for completing level
                init();
                gameState = 'levelComplete';
            }

            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15; // Gravity
                p.life--;
                return p.life > 0;
            });
        };

        // Collision detection
        const aabbCollision = (circle, rect) => {
            const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
            const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));

            const dx = circle.x - closestX;
            const dy = circle.y - closestY;

            return dx * dx + dy * dy < circle.radius * circle.radius;
        };

        // Particle effects
        const createParticles = (x, y, color) => {
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 * i) / 8;
                const speed = Math.random() * 2 + 2;

                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 20,
                    color
                });
            }
        };

        // Draw game
        const draw = () => {
            // Clear canvas
            ctx.fillStyle = '#001a4d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Gradient overlay
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw bricks
            for (const brick of bricks) {
                if (!brick.active) continue;

                ctx.fillStyle = brick.color;
                ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                ctx.beginPath();
                ctx.roundRect(brick.x, brick.y, brick.width, brick.height, 3);
                ctx.fill();
            }

            ctx.shadowColor = 'transparent';

            // Draw paddle
            ctx.fillStyle = '#4ECDC4';
            ctx.shadowColor = 'rgba(78, 205, 196, 0.6)';
            ctx.shadowBlur = 15;

            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fill();

            ctx.shadowColor = 'transparent';

            // Draw ball
            ctx.fillStyle = '#FFE66D';
            ctx.shadowColor = 'rgba(255, 230, 109, 0.8)';
            ctx.shadowBlur = 20;

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowColor = 'transparent';

            // Draw particles
            for (const p of particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 20;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // Draw UI
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.fillText(`Score: ${score}`, 20, 30);
            ctx.fillText(`Lives: ${lives}`, canvas.width - 180, 30);
            ctx.fillText(`Level: ${level}`, canvas.width / 2 - 40, 30);

            // Draw game state messages
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';

            if (gameState === 'start') {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fillText('BREAKOUT', canvas.width / 2, canvas.height / 2 - 40);
                ctx.font = '20px Arial';
                ctx.fillText('Press SPACE to start', canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText('Use arrow keys or mouse to move paddle', canvas.width / 2, canvas.height / 2 + 50);
            }

            if (gameState === 'paused') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
                ctx.font = '20px Arial';
                ctx.fillText('Press P to resume', canvas.width / 2, canvas.height / 2 + 40);
            }

            if (gameState === 'gameOver') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FF6B6B';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);
                ctx.fillStyle = '#fff';
                ctx.font = '24px Arial';
                ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.font = '20px Arial';
                ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 60);
            }

            if (gameState === 'levelComplete') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFE66D';
                ctx.fillText('LEVEL COMPLETE!', canvas.width / 2, canvas.height / 2 - 40);
                ctx.fillStyle = '#fff';
                ctx.font = '24px Arial';
                ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.font = '20px Arial';
                ctx.fillText('Press SPACE to continue', canvas.width / 2, canvas.height / 2 + 60);
            }

            ctx.textAlign = 'left';
        };

        // Game loop
        const gameLoop = () => {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        };

        // Polyfill for roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
            };
        }

        // Start game
        init();
        gameLoop();
    </script>
</body>
</html>

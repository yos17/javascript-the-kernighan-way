<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  THE LIBRARY: MiniTemplate
//  Compiles a template string into a reusable render function.
//  Syntax:
//    {{ expression }}          — HTML-escaped output
//    {{{ expression }}}        — raw (unescaped) HTML output
//    {{#if condition }}...{{/if}}           — conditional
//    {{#each item in list }}...{{/each}}    — iteration
//    {{#unless condition }}...{{/unless}}   — inverse conditional
// ═══════════════════════════════════════════════════════════════════════════════

// ─── Step 1: Tokenize ─────────────────────────────────────────────────────────
// Break the template string into a flat array of tokens.
// Each token is { type, value } where type is one of:
//   'text'    — literal HTML text (outside {{ }})
//   'expr'    — {{ expression }} — escaped output
//   'raw'     — {{{ expression }}} — raw output
//   'if'      — {{#if condition }}
//   'unless'  — {{#unless condition }}
//   'each'    — {{#each item in list }}
//   'endif'   — {{/if}}
//   'endunless'
//   'endeach' — {{/each}}

function tokenize(template) {
  const tokens = [];
  // Match {{ ... }} or {{{ ... }}}
  // The triple-brace check must come FIRST so {{{ is not consumed as {{ {
  const re = /\{\{\{([\s\S]*?)\}\}\}|\{\{([\s\S]*?)\}\}/g;
  let lastIndex = 0;
  let match;

  while ((match = re.exec(template)) !== null) {
    // Collect any literal text before this tag
    if (match.index > lastIndex) {
      tokens.push({ type: 'text', value: template.slice(lastIndex, match.index) });
    }

    if (match[1] !== undefined) {
      // Triple braces: raw HTML
      tokens.push({ type: 'raw', value: match[1].trim() });
    } else {
      // Double braces: parse the inner expression
      const inner = match[2].trim();

      if (inner.startsWith('#if ')) {
        tokens.push({ type: 'if', value: inner.slice(4).trim() });
      } else if (inner.startsWith('#unless ')) {
        tokens.push({ type: 'unless', value: inner.slice(8).trim() });
      } else if (inner.startsWith('#each ')) {
        // Syntax: #each item in list
        const parts = inner.slice(6).trim().split(/\s+in\s+/);
        tokens.push({ type: 'each', item: parts[0].trim(), list: parts[1].trim() });
      } else if (inner === '/if') {
        tokens.push({ type: 'endif' });
      } else if (inner === '/unless') {
        tokens.push({ type: 'endunless' });
      } else if (inner === '/each') {
        tokens.push({ type: 'endeach' });
      } else {
        tokens.push({ type: 'expr', value: inner });
      }
    }

    lastIndex = match.index + match[0].length;
  }

  // Any trailing literal text after the last tag
  if (lastIndex < template.length) {
    tokens.push({ type: 'text', value: template.slice(lastIndex) });
  }

  return tokens;
}

// ─── Step 2: Generate code ────────────────────────────────────────────────────
// Turn the token array into a JavaScript function body string.
// The generated code runs inside a `with(data)` block so template
// expressions can reference data properties directly (e.g. `name`, not `data.name`).

function generate(tokens) {
  let code = 'let __out = "";\n';
  let eachDepth = 0;

  for (const token of tokens) {
    switch (token.type) {
      case 'text':
        code += `__out += ${JSON.stringify(token.value)};\n`;
        break;

      case 'expr':
        // __esc() HTML-encodes the value to prevent XSS
        code += `__out += __esc(${token.value});\n`;
        break;

      case 'raw':
        // Unescaped: trust the author to provide safe HTML
        code += `__out += (${token.value});\n`;
        break;

      case 'if':
        code += `if (${token.value}) {\n`;
        break;

      case 'endif':
        code += '}\n';
        break;

      case 'unless':
        code += `if (!(${token.value})) {\n`;
        break;

      case 'endunless':
        code += '}\n';
        break;

      case 'each':
        eachDepth++;
        // Each iteration creates: the item variable, $index, $first, $last
        code += `const __list${eachDepth} = (${token.list}) || [];\n`;
        code += `for (let __i${eachDepth} = 0; __i${eachDepth} < __list${eachDepth}.length; __i${eachDepth}++) {\n`;
        code += `  const ${token.item} = __list${eachDepth}[__i${eachDepth}];\n`;
        code += `  const $index = __i${eachDepth};\n`;
        code += `  const $first = __i${eachDepth} === 0;\n`;
        code += `  const $last  = __i${eachDepth} === __list${eachDepth}.length - 1;\n`;
        break;

      case 'endeach':
        code += '}\n';
        eachDepth--;
        break;
    }
  }

  code += 'return __out;';
  return code;
}

// ─── Step 3: Compile ──────────────────────────────────────────────────────────
// compile() takes a template string and returns a render function.
// The render function takes a data object and returns an HTML string.

function compile(templateStr) {
  const tokens = tokenize(templateStr);
  const code   = generate(tokens);

  // new Function() creates a function from a string of code.
  // The function uses `with(data)` so expressions like `name` resolve
  // from the data object rather than requiring `data.name`.
  // __esc is passed in as a parameter to be available inside `with`.
  return new Function('data', '__esc', `with(data) {\n${code}\n}`);
}

// ─── HTML escaping ────────────────────────────────────────────────────────────
// Prevents user-controlled strings from injecting HTML/JS.
function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ─── Render helper ────────────────────────────────────────────────────────────
// render(template, data) is the public API — compile then call.
function render(templateStr, data) {
  const fn = compile(templateStr);
  return fn(data, escapeHtml);
}

// ═══════════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════════
//  UI WIRING
// ═══════════════════════════════════════════════════════════════════════════════

function loadExample(name) {
  const ex = EXAMPLES[name];
  document.getElementById('template-input').value = ex.template;
  document.getElementById('data-input').value     = JSON.stringify(ex.data, null, 2);
  document.querySelectorAll('.ex-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.ex === name);
  });
  renderTemplate();
}

function renderTemplate() {
  const templateStr = document.getElementById('template-input').value;
  const dataStr     = document.getElementById('data-input').value;
  const renderEl    = document.getElementById('rendered');
  const rawEl       = document.getElementById('raw-output');
  const renderErr   = document.getElementById('render-error');
  const dataErr     = document.getElementById('data-error');

  renderErr.style.display = 'none';
  dataErr.style.display   = 'none';
  document.getElementById('tokens-panel').style.display = 'none';

  let data;
  try {
    data = JSON.parse(dataStr);
  } catch (e) {
    dataErr.textContent  = 'JSON error: ' + e.message;
    dataErr.style.display = 'block';
    return;
  }

  try {
    const html = render(templateStr, data);
    renderEl.innerHTML  = html;
    rawEl.textContent   = html;
  } catch (e) {
    renderErr.textContent  = 'Template error: ' + e.message;
    renderErr.style.display = 'block';
    renderEl.innerHTML  = '';
    rawEl.textContent   = '';
  }
}

function showTokens() {
  const templateStr  = document.getElementById('template-input').value;
  const tokensPanel  = document.getElementById('tokens-panel');
  const tokenListEl  = document.getElementById('token-list');

  let tokens;
  try {
    tokens = tokenize(templateStr);
  } catch (e) {
    return;
  }

  const typeClass = {
    text: 't-text', expr: 't-expr', raw: 't-raw',
    if: 't-if', unless: 't-if', endif: 't-end', endunless: 't-end',
    each: 't-each', endeach: 't-end',
  };

  tokenListEl.innerHTML = tokens.map(t => {
    const val = t.value || (t.item ? `${t.item} in ${t.list}` : '') || '';
    const preview = val.length > 60 ? val.slice(0, 57) + '…' : val;
    return `<div class="token">
      <span class="token-type ${typeClass[t.type] || ''}">${t.type}</span>
      <span class="token-val">${escapeHtml(preview)}</span>
    </div>`;
  }).join('');

  tokensPanel.style.display = 'block';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Wire up example buttons
document.querySelectorAll('.ex-btn').forEach(btn => {
  btn.addEventListener('click', () => loadExample(btn.dataset.ex));
});

document.getElementById('template-input').addEventListener('input', renderTemplate);

// Load first example on startup
loadExample('profile');

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Machine - Chapter 11</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            color: #00ff88;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #0f1419;
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 10px #00ff88;
            letter-spacing: 2px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: #1a1f2e;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #00ff88;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ff88;
        }

        .control-group input[type="range"],
        .control-group input[type="number"] {
            padding: 8px;
            background: #0f1419;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .control-group input[type="range"] {
            cursor: pointer;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
        }

        .control-group input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background: #00ff88;
            color: #0f1419;
            border: none;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 100px;
        }

        button:hover {
            background: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.8);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.playing {
            background: #ff0055;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.8);
        }

        .bpm-display {
            font-size: 1.8em;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
            text-align: center;
        }

        .sequencer {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 6px;
            border: 2px solid #00ff88;
            overflow-x: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 80px repeat(16, 1fr);
            gap: 4px;
            min-width: min-content;
        }

        .drum-label {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f1419;
            border: 1px solid #00ff88;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
            padding: 8px;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .step-pad {
            aspect-ratio: 1;
            background: #2a3f5f;
            border: 1px solid #00ff88;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            position: relative;
        }

        .step-pad:hover {
            background: #3d5580;
        }

        .step-pad.active {
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.8), inset 0 0 10px rgba(0, 255, 136, 0.4);
            color: #0f1419;
        }

        .step-pad.current {
            border-color: #ff0055;
            border-width: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
        }

        .info {
            margin-top: 20px;
            padding: 15px;
            background: #1a1f2e;
            border-left: 3px solid #00ff88;
            font-size: 0.9em;
            line-height: 1.6;
            color: #aaaaaa;
        }

        .info strong {
            color: #00ff88;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 60px repeat(8, 1fr);
            }

            .drum-label {
                font-size: 0.6em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥁 DRUM MACHINE</h1>

        <div class="controls">
            <div class="control-group">
                <label>Master Volume</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
                <span id="volumeDisplay">50%</span>
            </div>

            <div class="control-group">
                <label>BPM (Tempo)</label>
                <div style="display: flex; gap: 8px;">
                    <input type="range" id="bpmSlider" min="60" max="200" value="120">
                    <input type="number" id="bpmInput" min="60" max="200" value="120" style="width: 70px;">
                </div>
                <div class="bpm-display" id="bpmDisplay">120</div>
            </div>

            <div class="control-group button-group">
                <button id="playBtn">▶ PLAY</button>
                <button id="stopBtn">⏹ STOP</button>
                <button id="clearBtn">🗑 CLEAR</button>
            </div>

            <div class="control-group button-group">
                <button id="preset1Btn">PATTERN: ROCK</button>
                <button id="preset2Btn">PATTERN: FUNK</button>
            </div>
        </div>

        <div class="sequencer">
            <div class="grid" id="grid"></div>
        </div>

        <div class="info">
            <strong>Keyboard Shortcuts:</strong> SPACE = Play/Stop • 1-8 = Trigger Drums • Click pads to toggle steps
        </div>
    </div>

    <script>
        // Drum definitions with synthesis parameters
        const drumSounds = [
            { name: 'KICK', icon: '🔴', color: '#ff3366' },
            { name: 'SNARE', icon: '⭕', color: '#00ff88' },
            { name: 'HI-HAT C', icon: '✨', color: '#ffff00' },
            { name: 'HI-HAT O', icon: '🌟', color: '#ffff00' },
            { name: 'CLAP', icon: '👏', color: '#ff00ff' },
            { name: 'TOM', icon: '🥁', color: '#ff9900' },
            { name: 'RIM', icon: '📍', color: '#00ccff' },
            { name: 'CRASH', icon: '💥', color: '#ff6600' }
        ];

        // Audio context and state
        let audioContext;
        let masterGain;
        let isPlaying = false;
        let currentStep = 0;
        let stepScheduleID = null;
        let lookaheadID = null;
        let nextStepTime = 0;

        const SCHEDULE_AHEAD_TIME = 0.1; // seconds
        const LOOK_AHEAD_TIME = 25; // milliseconds

        // Sequencer state: 8 drums × 16 steps
        const sequencer = Array(8).fill(null).map(() => Array(16).fill(false));

        // Initialize
        function init() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioContext.createGain();
            masterGain.connect(audioContext.destination);

            setupUI();
            setupEventListeners();
        }

        function setupUI() {
            const grid = document.getElementById('grid');
            for (let drumIdx = 0; drumIdx < 8; drumIdx++) {
                const label = document.createElement('div');
                label.className = 'drum-label';
                label.textContent = drumSounds[drumIdx].name;
                grid.appendChild(label);

                for (let stepIdx = 0; stepIdx < 16; stepIdx++) {
                    const pad = document.createElement('div');
                    pad.className = 'step-pad';
                    pad.dataset.drum = drumIdx;
                    pad.dataset.step = stepIdx;
                    pad.textContent = stepIdx % 4 === 0 ? (stepIdx / 4 + 1) : '';
                    pad.addEventListener('click', () => toggleStep(drumIdx, stepIdx, pad));
                    grid.appendChild(pad);
                }
            }
        }

        function setupEventListeners() {
            document.getElementById('playBtn').addEventListener('click', play);
            document.getElementById('stopBtn').addEventListener('click', stop);
            document.getElementById('clearBtn').addEventListener('click', clearSequencer);
            document.getElementById('preset1Btn').addEventListener('click', () => loadPreset(presets.rock));
            document.getElementById('preset2Btn').addEventListener('click', () => loadPreset(presets.funk));

            document.getElementById('volumeSlider').addEventListener('input', (e) => {
                const vol = parseFloat(e.target.value);
                masterGain.gain.value = vol;
                document.getElementById('volumeDisplay').textContent = Math.round(vol * 100) + '%';
            });

            document.getElementById('bpmSlider').addEventListener('input', (e) => {
                const bpm = parseInt(e.target.value);
                document.getElementById('bpmInput').value = bpm;
                document.getElementById('bpmDisplay').textContent = bpm;
            });

            document.getElementById('bpmInput').addEventListener('input', (e) => {
                let bpm = parseInt(e.target.value);
                if (bpm < 60) bpm = 60;
                if (bpm > 200) bpm = 200;
                document.getElementById('bpmSlider').value = bpm;
                document.getElementById('bpmDisplay').textContent = bpm;
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    isPlaying ? stop() : play();
                }
                const keyNum = parseInt(e.key);
                if (keyNum >= 1 && keyNum <= 8) {
                    triggerDrum(keyNum - 1);
                }
            });
        }

        function toggleStep(drumIdx, stepIdx, padElement) {
            sequencer[drumIdx][stepIdx] = !sequencer[drumIdx][stepIdx];
            padElement.classList.toggle('active', sequencer[drumIdx][stepIdx]);
        }

        function clearSequencer() {
            sequencer.forEach(row => row.fill(false));
            document.querySelectorAll('.step-pad.active').forEach(pad => {
                pad.classList.remove('active');
            });
        }

        function getBPM() {
            return parseInt(document.getElementById('bpmSlider').value);
        }

        function play() {
            isPlaying = true;
            nextStepTime = audioContext.currentTime;
            currentStep = 0;
            document.getElementById('playBtn').classList.add('playing');
            document.getElementById('stopBtn').classList.remove('playing');

            // Schedule notes ahead of time
            lookaheadID = setInterval(scheduleNotes, LOOK_AHEAD_TIME);
        }

        function stop() {
            isPlaying = false;
            currentStep = 0;
            clearInterval(lookaheadID);
            clearCurrentHighlight();
            document.getElementById('playBtn').classList.remove('playing');
        }

        function scheduleNotes() {
            const scheduleAheadTime = audioContext.currentTime + SCHEDULE_AHEAD_TIME;

            while (nextStepTime < scheduleAheadTime) {
                scheduleStep(currentStep, nextStepTime);
                advanceStep();
            }
        }

        function scheduleStep(stepIdx, time) {
            for (let drumIdx = 0; drumIdx < 8; drumIdx++) {
                if (sequencer[drumIdx][stepIdx]) {
                    triggerDrumAt(drumIdx, time);
                }
            }
        }

        function advanceStep() {
            currentStep = (currentStep + 1) % 16;
            const beatDuration = 60 / getBPM() / 4; // 16th note
            nextStepTime += beatDuration;

            // Update visual indicator
            updateCurrentStepHighlight();
        }

        function updateCurrentStepHighlight() {
            clearCurrentHighlight();
            document.querySelectorAll(`[data-step="${currentStep}"]`).forEach(pad => {
                pad.classList.add('current');
            });
        }

        function clearCurrentHighlight() {
            document.querySelectorAll('.step-pad.current').forEach(pad => {
                pad.classList.remove('current');
            });
        }

        function triggerDrum(drumIdx) {
            triggerDrumAt(drumIdx, audioContext.currentTime);
        }

        function triggerDrumAt(drumIdx, time) {
            switch (drumIdx) {
                case 0: synthesizeKick(time); break;
                case 1: synthesizeSnare(time); break;
                case 2: synthesizeHiHatClosed(time); break;
                case 3: synthesizeHiHatOpen(time); break;
                case 4: synthesizeClap(time); break;
                case 5: synthesizeTom(time); break;
                case 6: synthesizeRim(time); break;
                case 7: synthesizeCrash(time); break;
            }
        }

        // Drum synthesis functions using Web Audio API

        function synthesizeKick(time) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);

            gain.gain.setValueAtTime(0.8, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);

            osc.start(time);
            osc.stop(time + 0.5);
        }

        function synthesizeSnare(time) {
            // Noise component
            const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.2, audioContext.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseBuffer.length; i++) {
                noiseData[i] = Math.random() * 2 - 1;
            }

            const noiseSource = audioContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'band-pass';
            filter.frequency.value = 3000;
            filter.Q.value = 2;

            const gain = audioContext.createGain();
            noiseSource.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);

            gain.gain.setValueAtTime(0.5, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);

            noiseSource.start(time);
            noiseSource.stop(time + 0.15);

            // Pitch component (sine oscillator)
            const osc = audioContext.createOscillator();
            const oscGain = audioContext.createGain();
            osc.connect(oscGain);
            oscGain.connect(masterGain);

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, time);
            osc.frequency.linearRampToValueAtTime(100, time + 0.1);

            oscGain.gain.setValueAtTime(0.3, time);
            oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);

            osc.start(time);
            osc.stop(time + 0.1);
        }

        function synthesizeHiHatClosed(time) {
            const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.08, audioContext.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseBuffer.length; i++) {
                noiseData[i] = Math.random() * 2 - 1;
            }

            const noiseSource = audioContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'high-pass';
            filter.frequency.value = 8000;

            const gain = audioContext.createGain();
            noiseSource.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);

            gain.gain.setValueAtTime(0.4, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);

            noiseSource.start(time);
            noiseSource.stop(time + 0.08);
        }

        function synthesizeHiHatOpen(time) {
            const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.3, audioContext.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseBuffer.length; i++) {
                noiseData[i] = Math.random() * 2 - 1;
            }

            const noiseSource = audioContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'high-pass';
            filter.frequency.value = 7000;

            const gain = audioContext.createGain();
            noiseSource.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);

            gain.gain.setValueAtTime(0.3, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);

            noiseSource.start(time);
            noiseSource.stop(time + 0.3);
        }

        function synthesizeClap(time) {
            // Multiple short bursts of noise
            for (let i = 0; i < 3; i++) {
                const delay = i * 0.015;
                const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.08, audioContext.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let j = 0; j < noiseBuffer.length; j++) {
                    noiseData[j] = Math.random() * 2 - 1;
                }

                const noiseSource = audioContext.createBufferSource();
                noiseSource.buffer = noiseBuffer;

                const filter = audioContext.createBiquadFilter();
                filter.type = 'band-pass';
                filter.frequency.value = 2000;
                filter.Q.value = 1.5;

                const gain = audioContext.createGain();
                noiseSource.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);

                gain.gain.setValueAtTime(0.4, time + delay);
                gain.gain.exponentialRampToValueAtTime(0.01, time + delay + 0.08);

                noiseSource.start(time + delay);
                noiseSource.stop(time + delay + 0.08);
            }
        }

        function synthesizeTom(time) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, time);
            osc.frequency.exponentialRampToValueAtTime(150, time + 0.15);

            gain.gain.setValueAtTime(0.6, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);

            osc.start(time);
            osc.stop(time + 0.15);
        }

        function synthesizeRim(time) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(8000, time);
            osc.frequency.exponentialRampToValueAtTime(5000, time + 0.05);

            gain.gain.setValueAtTime(0.5, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);

            osc.start(time);
            osc.stop(time + 0.05);
        }

        function synthesizeCrash(time) {
            // Long, complex noise burst with filtering
            const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.8, audioContext.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseBuffer.length; i++) {
                noiseData[i] = Math.random() * 2 - 1;
            }

            const noiseSource = audioContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;

            // High-pass filter for brightness
            const hiFilter = audioContext.createBiquadFilter();
            hiFilter.type = 'high-pass';
            hiFilter.frequency.value = 5000;

            const gain = audioContext.createGain();
            noiseSource.connect(hiFilter);
            hiFilter.connect(gain);
            gain.connect(masterGain);

            gain.gain.setValueAtTime(0.4, time);
            gain.gain.exponentialRampToValueAtTime(0.05, time + 0.3);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.8);

            noiseSource.start(time);
            noiseSource.stop(time + 0.8);
        }

        // Preset patterns
        const presets = {
            rock: [
                // Kick: 1 and 3 on the 16th
                [true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false],
                // Snare: 2 and 4
                [false, false, true, false, false, false, true, false, false, false, true, false, false, false, true, false],
                // Hi-hat closed: all 16ths
                [true, true, true, true, true, true, true, true, true, true, true, true, true, true, true, true],
                // Hi-hat open: syncopated
                [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false],
                // Clap: off
                [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false],
                // Tom: off
                [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false],
                // Rim: off
                [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false],
                // Crash: on 1
                [true, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]
            ],
            funk: [
                // Kick: syncopated funk pattern
                [true, false, false, true, false, false, true, false, true, false, false, true, false, false, true, false],
                // Snare: off-beat
                [false, false, true, false, false, true, false, false, false, false, true, false, false, true, false, false],
                // Hi-hat closed: 16th notes with gaps
                [true, false, true, false, true, false, true, false, true, false, true, false, true, false, true, false],
                // Hi-hat open: syncopated
                [false, false, false, true, false, true, false, false, false, false, false, true, false, true, false, false],
                // Clap: punchy
                [false, false, false, true, false, false, false, true, false, false, false, true, false, false, false, true],
                // Tom: fills
                [false, false, false, false, false, false, false, false, true, true, false, false, false, false, false, false],
                // Rim: rhythmic
                [false, true, false, false, true, false, false, true, false, false, true, false, false, true, false, false],
                // Crash: accents
                [false, false, false, false, false, false, false, false, true, false, false, false, false, false, false, false]
            ]
        };

        function loadPreset(preset) {
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 16; j++) {
                    sequencer[i][j] = preset[i][j];
                }
            }
            // Update UI
            document.querySelectorAll('.step-pad').forEach(pad => {
                const drum = parseInt(pad.dataset.drum);
                const step = parseInt(pad.dataset.step);
                pad.classList.toggle('active', sequencer[drum][step]);
            });
        }

        // Start the app
        init();
    </script>
</body>
</html>

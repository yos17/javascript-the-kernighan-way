<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 3 — Control Flow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Georgia", serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 { font-size: 1.6rem; color: #a8d8ea; margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 2rem; font-style: italic; }

    .section {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .section h2 {
      font-size: 0.95rem;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

    label { display: block; color: #a8d8ea; font-size: 0.82rem; margin-bottom: 0.3rem; margin-top: 0.6rem; }

    input[type="text"], input[type="number"], textarea {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      font-family: "Courier New", monospace;
      font-size: 0.88rem;
      outline: none;
    }

    textarea { resize: vertical; }
    input:focus, textarea:focus { border-color: #e94560; }

    button {
      margin-top: 0.75rem;
      background: #e94560;
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 4px;
      font-family: "Georgia", serif;
      font-size: 0.9rem;
      cursor: pointer;
      margin-right: 0.5rem;
    }

    button:hover { background: #c73652; }
    button.secondary { background: #0f3460; }
    button.secondary:hover { background: #1a4a80; }

    .output {
      margin-top: 0.75rem;
      padding: 0.75rem 1rem;
      background: #0d0d1a;
      border-left: 3px solid #e94560;
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      color: #a8d8ea;
      white-space: pre-wrap;
      min-height: 2rem;
      border-radius: 0 4px 4px 0;
      max-height: 220px;
      overflow-y: auto;
    }

    /* Binary search visualizer */
    .bs-array {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 0.5rem;
    }

    .bs-cell {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Courier New", monospace;
      font-size: 0.72rem;
      border-radius: 4px;
      border: 1px solid #0f3460;
      background: #0d0d1a;
      color: #888;
      transition: all 0.3s;
    }

    .bs-cell.in-range { background: #16213e; color: #e0e0e0; border-color: #0f3460; }
    .bs-cell.mid      { background: #3a1a2e; color: #e94560; border-color: #e94560; }
    .bs-cell.found    { background: #1a3a2e; color: #7fba00; border-color: #7fba00; }
    .bs-cell.eliminated { background: #0d0d1a; color: #333; border-color: #1a1a2e; }

    .step-info {
      margin-top: 0.5rem;
      font-family: "Courier New", monospace;
      font-size: 0.8rem;
      color: #f7b731;
      min-height: 1.2rem;
    }

    /* Collatz chart */
    .collatz-bars {
      display: flex;
      align-items: flex-end;
      gap: 1px;
      height: 100px;
      margin-top: 0.5rem;
      border-bottom: 1px solid #0f3460;
    }

    .cbar {
      flex: 1;
      background: #e94560;
      opacity: 0.7;
      min-width: 1px;
      transition: opacity 0.1s;
      cursor: pointer;
    }

    .cbar:hover { opacity: 1; }

    /* Bubble sort visualizer */
    .sort-array {
      display: flex;
      gap: 3px;
      margin-top: 0.5rem;
      align-items: flex-end;
    }

    .sort-bar {
      flex: 1;
      background: #a8d8ea;
      border-radius: 2px 2px 0 0;
      min-height: 4px;
      transition: height 0.08s, background 0.08s;
    }

    .sort-bar.comparing { background: #e94560; }
    .sort-bar.sorted    { background: #7fba00; }

    .sort-controls { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; align-items: center; }
    .sort-controls span { font-family: "Courier New", monospace; font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>

<h1>Chapter 3 — Control Flow</h1>
<p class="subtitle">JavaScript: The Kernighan Way</p>

<div class="grid-2">

  <!-- BINARY SEARCH VISUALIZER -->
  <div class="section">
    <h2>3.12 — Binary Search Visualizer</h2>
    <label>Target value (array is 1–50 sorted)</label>
    <input type="number" id="bsTarget" value="37" min="1" max="50">
    <button onclick="startBinarySearch()">Search</button>
    <button class="secondary" onclick="stepBinarySearch()">Step</button>
    <div class="bs-array" id="bsArray"></div>
    <div class="step-info" id="bsStepInfo">Press Search to begin.</div>
    <div class="output" id="bsOutput"></div>
  </div>

  <!-- COLLATZ SEQUENCE -->
  <div class="section">
    <h2>Exercise 3-2 — Collatz Sequence</h2>
    <label>Starting value n</label>
    <input type="number" id="collatzN" value="27" min="1">
    <button onclick="runCollatz()">Run</button>
    <button class="secondary" onclick="findLongestCollatz()">Find Longest (1–999)</button>
    <div class="collatz-bars" id="collatzBars" title="Sequence values"></div>
    <div class="output" id="collatzOutput"></div>
  </div>

  <!-- BUBBLE SORT VISUALIZER -->
  <div class="section">
    <h2>Exercise 3-3 — Bubble Sort</h2>
    <div class="sort-array" id="sortArray"></div>
    <div class="sort-controls">
      <button onclick="resetSort()">Shuffle</button>
      <button class="secondary" onclick="startSort()">Sort</button>
      <button class="secondary" onclick="stopSort()">Stop</button>
      <span id="sortStatus">—</span>
    </div>
    <div class="output" id="sortOutput"></div>
  </div>

  <!-- EXCEPTION DEMO -->
  <div class="section">
    <h2>3.11 — try-catch-finally</h2>
    <label>JSON string to parse</label>
    <textarea id="jsonInput" rows="4">{"name": "Alice", "score": 42}</textarea>
    <button onclick="parseJSON()">Parse</button>
    <div class="output" id="jsonOutput"></div>
  </div>

  <!-- MATRIX MULTIPLY (Exercise 3-5) -->
  <div class="section" style="grid-column: 1 / -1;">
    <h2>Exercise 3-5 — Matrix Multiplication</h2>
    <div style="display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:1rem;align-items:center;">
      <div>
        <label>Matrix A (rows, space-separated)</label>
        <textarea id="matA" rows="3" style="font-size:0.8rem;">1 2 3
4 5 6</textarea>
      </div>
      <div style="color:#e94560;font-size:1.5rem;text-align:center;">×</div>
      <div>
        <label>Matrix B (rows, space-separated)</label>
        <textarea id="matB" rows="3" style="font-size:0.8rem;">7 8
9 10
11 12</textarea>
      </div>
      <div style="color:#e94560;font-size:1.5rem;text-align:center;">=</div>
      <div>
        <label>Result</label>
        <div class="output" id="matOutput" style="min-height:4rem;"></div>
      </div>
    </div>
    <button onclick="multiplyMatrices()" style="margin-top:1rem;">Multiply</button>
  </div>

</div>

<script>
  // ── 3.12 Binary Search ─────────────────────────────────────────────────────
  const BS_ARRAY = Array.from({length: 50}, (_, i) => i + 1);
  let bsState = null;

  function buildBsArray(state) {
    const container = document.getElementById("bsArray");
    container.innerHTML = "";
    BS_ARRAY.forEach((val, i) => {
      const cell = document.createElement("div");
      cell.className = "bs-cell";
      cell.textContent = val;
      if (state) {
        if (i === state.mid) cell.classList.add(state.found ? "found" : "mid");
        else if (i < state.low || i > state.high) cell.classList.add("eliminated");
        else cell.classList.add("in-range");
      }
      container.appendChild(cell);
    });
  }

  function startBinarySearch() {
    const target = parseInt(document.getElementById("bsTarget").value, 10);
    bsState = { target, low: 0, high: BS_ARRAY.length - 1, steps: [], done: false, found: false, mid: -1 };
    buildBsArray(bsState);
    document.getElementById("bsStepInfo").textContent = `Searching for ${target}. Press Step.`;
    document.getElementById("bsOutput").textContent = "";
  }

  function stepBinarySearch() {
    if (!bsState) { startBinarySearch(); return; }
    if (bsState.done) {
      document.getElementById("bsStepInfo").textContent = "Search complete. Press Search to restart.";
      return;
    }

    const { target } = bsState;
    let { low, high } = bsState;

    if (low > high) {
      bsState.done = true;
      document.getElementById("bsStepInfo").textContent = `${target} not found.`;
      document.getElementById("bsOutput").textContent = `Result: -1 (not found)\nSteps: ${bsState.steps.length}`;
      return;
    }

    const mid = Math.floor((low + high) / 2);
    bsState.mid = mid;
    bsState.steps.push({ low, high, mid, val: BS_ARRAY[mid] });

    if (BS_ARRAY[mid] === target) {
      bsState.done = true;
      bsState.found = true;
      buildBsArray(bsState);
      document.getElementById("bsStepInfo").textContent = `Found ${target} at index ${mid}!`;
      document.getElementById("bsOutput").textContent =
        `Found at index ${mid} (value ${BS_ARRAY[mid]})\nSteps taken: ${bsState.steps.length}\n\nSearch log:\n` +
        bsState.steps.map(s => `  low=${s.low} high=${s.high} mid=${s.mid} arr[mid]=${s.val}`).join("\n");
    } else if (BS_ARRAY[mid] < target) {
      bsState.low = mid + 1;
      buildBsArray(bsState);
      document.getElementById("bsStepInfo").textContent =
        `Step ${bsState.steps.length}: arr[${mid}]=${BS_ARRAY[mid]} < ${target}, search right half`;
    } else {
      bsState.high = mid - 1;
      buildBsArray(bsState);
      document.getElementById("bsStepInfo").textContent =
        `Step ${bsState.steps.length}: arr[${mid}]=${BS_ARRAY[mid]} > ${target}, search left half`;
    }
  }

  buildBsArray(null);

  // ── Exercise 3-2 Collatz ────────────────────────────────────────────────────
  function collatz(n) {
    let steps = 0;
    const seq = [n];
    while (n !== 1) {
      n = (n % 2 === 0) ? n / 2 : 3 * n + 1;
      seq.push(n);
      steps++;
    }
    return { steps, seq };
  }

  function runCollatz() {
    const n = parseInt(document.getElementById("collatzN").value, 10);
    if (isNaN(n) || n < 1) return;
    const { steps, seq } = collatz(n);
    drawCollatzBars(seq);
    document.getElementById("collatzOutput").textContent =
      `n = ${n}\nSteps to reach 1: ${steps}\nPeak value: ${Math.max(...seq)}\nSequence length: ${seq.length}`;
  }

  function drawCollatzBars(seq) {
    const container = document.getElementById("collatzBars");
    container.innerHTML = "";
    const maxVal = Math.max(...seq);
    seq.forEach(val => {
      const bar = document.createElement("div");
      bar.className = "cbar";
      bar.style.height = `${(val / maxVal) * 96}px`;
      bar.title = val;
      container.appendChild(bar);
    });
  }

  function findLongestCollatz() {
    let maxSteps = 0, maxN = 1;
    for (let i = 1; i < 1000; i++) {
      const { steps } = collatz(i);
      if (steps > maxSteps) { maxSteps = steps; maxN = i; }
    }
    document.getElementById("collatzN").value = maxN;
    runCollatz();
    document.getElementById("collatzOutput").textContent =
      `Longest Collatz sequence below 1000:\nn = ${maxN} → ${maxSteps} steps\n` +
      document.getElementById("collatzOutput").textContent.split("\n").slice(1).join("\n");
  }

  runCollatz();

  // ── Exercise 3-3 Bubble Sort ─────────────────────────────────────────────────
  let sortArr = [];
  let sortTimer = null;
  const SORT_SIZE = 40;

  function resetSort() {
    stopSort();
    sortArr = Array.from({length: SORT_SIZE}, () => Math.floor(Math.random() * 95) + 5);
    renderSortBars(sortArr, [], []);
    document.getElementById("sortStatus").textContent = "—";
    document.getElementById("sortOutput").textContent = "";
  }

  function renderSortBars(arr, comparing, sorted) {
    const container = document.getElementById("sortArray");
    container.innerHTML = "";
    arr.forEach((val, i) => {
      const bar = document.createElement("div");
      bar.className = "sort-bar";
      bar.style.height = `${val}px`;
      if (sorted.includes(i)) bar.classList.add("sorted");
      else if (comparing.includes(i)) bar.classList.add("comparing");
      container.appendChild(bar);
    });
  }

  function stopSort() {
    if (sortTimer) { clearTimeout(sortTimer); sortTimer = null; }
  }

  async function startSort() {
    stopSort();
    const arr = [...sortArr];
    const sortedIndices = new Set();
    let swaps = 0, comparisons = 0;
    let delay = 18;

    function step(i, j, passes, n) {
      if (n === 0) {
        // Mark all as sorted
        renderSortBars(arr, [], Array.from({length: arr.length}, (_, k) => k));
        document.getElementById("sortStatus").textContent = `Done — ${passes} passes, ${comparisons} comparisons, ${swaps} swaps`;
        document.getElementById("sortOutput").textContent =
          `Sorted ${arr.length} elements\nPasses: ${passes}\nComparisons: ${comparisons}\nSwaps: ${swaps}`;
        sortArr = arr;
        return;
      }
      if (j >= n - 1) {
        sortedIndices.add(n - 1);
        if (swaps === 0) {
          // Early exit: already sorted
          for (let k = 0; k < arr.length; k++) sortedIndices.add(k);
          renderSortBars(arr, [], Array.from(sortedIndices));
          document.getElementById("sortStatus").textContent = `Early exit after ${passes} pass(es)`;
          sortArr = arr;
          return;
        }
        const prevSwaps = swaps;
        sortTimer = setTimeout(() => step(0, 0, passes + 1, n - 1), delay);
        return;
      }
      comparisons++;
      renderSortBars(arr, [j, j + 1], Array.from(sortedIndices));
      if (arr[j] > arr[j + 1]) {
        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
        swaps++;
      }
      document.getElementById("sortStatus").textContent =
        `Pass ${passes + 1}, comparing [${j}] and [${j + 1}]`;
      sortTimer = setTimeout(() => step(i, j + 1, passes, n), delay);
    }

    step(0, 0, 0, arr.length);
  }

  resetSort();

  // ── 3.11 JSON parse try-catch ────────────────────────────────────────────────
  function parseJSON() {
    const input = document.getElementById("jsonInput").value;
    let finalMsg = "";
    try {
      const result = JSON.parse(input);
      const keys = Object.keys(result);
      document.getElementById("jsonOutput").textContent =
        `Parsed successfully.\nType: ${Array.isArray(result) ? "array" : typeof result}\n` +
        (typeof result === "object" && result !== null
          ? `Keys: ${keys.join(", ")}\n\nFormatted:\n${JSON.stringify(result, null, 2)}`
          : `Value: ${result}`);
    } catch (error) {
      document.getElementById("jsonOutput").textContent =
        `Error: ${error.message}\n\nThe JSON is malformed.\nTry: {"key": "value"}`;
    } finally {
      finalMsg = "  (finally block always runs)";
    }
    if (finalMsg) {
      document.getElementById("jsonOutput").textContent += "\n" + finalMsg;
    }
  }

  parseJSON();

  // ── Exercise 3-5 Matrix Multiply ─────────────────────────────────────────────
  function parseMatrix(text) {
    return text.trim().split("\n").map(row =>
      row.trim().split(/\s+/).map(Number)
    );
  }

  function matrixMultiply(A, B) {
    const rowsA = A.length, colsA = A[0].length;
    const rowsB = B.length, colsB = B[0].length;

    if (colsA !== rowsB) throw new Error(`Cannot multiply ${rowsA}×${colsA} by ${rowsB}×${colsB}: inner dimensions must match`);

    const C = Array.from({length: rowsA}, () => new Array(colsB).fill(0));
    for (let i = 0; i < rowsA; i++)
      for (let j = 0; j < colsB; j++)
        for (let k = 0; k < colsA; k++)
          C[i][j] += A[i][k] * B[k][j];

    return C;
  }

  function multiplyMatrices() {
    try {
      const A = parseMatrix(document.getElementById("matA").value);
      const B = parseMatrix(document.getElementById("matB").value);
      const C = matrixMultiply(A, B);
      const rowsA = A.length, colsA = A[0].length, colsB = B[0].length;
      const formatted = C.map(row => row.map(v => String(v).padStart(6)).join(" ")).join("\n");
      document.getElementById("matOutput").textContent =
        `${rowsA}×${colsA}  ×  ${colsA}×${colsB}  =  ${rowsA}×${colsB}\n\n${formatted}`;
    } catch (e) {
      document.getElementById("matOutput").textContent = `Error: ${e.message}`;
    }
  }

  multiplyMatrices();
</script>
</body>
</html>
